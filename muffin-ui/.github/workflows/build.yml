# Build & push the Muffin web app image (arm64) to GHCR.
#
# NOTE: GitHub only runs workflows from `.github/workflows` at a repository root.
# While muffin-ui lives inside the `gururafiki/muffin` umbrella repo this file is
# dormant; it activates once muffin-ui is extracted into its own repo (the
# intended end state). Mirrors the other image repos in the umbrella.
name: Build image

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/muffin-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
