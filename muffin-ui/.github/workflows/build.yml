# Build & push the Muffin web app image (arm64) to GHCR.
#
# Builds the Expo web export + nginx image (see Dockerfile) on a native arm64
# runner and pushes it to ghcr.io/<owner>/muffin-ui. The deployment
# (gururafiki/muffin-deployment) pulls this :latest tag onto the Oracle ARM node.
# Mirrors the other image repos in the umbrella (agent-chat-ui-docker, etc.).
name: Build image

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/muffin-ui:latest
            ghcr.io/${{ github.repository_owner }}/muffin-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
