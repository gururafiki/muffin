# nginx config for the Muffin web app (Expo static export).
#
# Serves the SPA and reverse-proxies /api/* to the internal LangGraph server,
# mirroring agent-chat-ui's same-origin proxy so the browser never needs CORS.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Same-origin API proxy → langgraph-api on the overlay network.
    # The trailing slash strips the /api prefix: /api/threads → /threads.
    location /api/ {
        proxy_pass http://langgraph-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass Cloudflare Access identity through to the agent auth hook.
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;

        # Streaming (SSE) needs buffering off and long-lived connections.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Static assets + SPA fallback (dynamic routes hydrate client-side).
    location / {
        try_files $uri $uri.html /index.html;
    }
}
